
apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

// Load release signing config from android/keystore.properties (preferred for
// local builds) or from environment variables (preferred for CI). The file is
// gitignored; never commit it. If neither source provides all four values, the
// release signingConfig is omitted and `bundleRelease` produces an unsigned
// AAB that Play Console will reject — this is intentional, not a bug.
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def resolveSigning = { String fileKey, String envKey ->
    return keystoreProperties.getProperty(fileKey) ?: System.getenv(envKey)
}

def signingStoreFile     = resolveSigning("storeFile",     "UNLOOP_KEYSTORE_FILE")
def signingStorePassword = resolveSigning("storePassword", "UNLOOP_KEYSTORE_PASSWORD")
def signingKeyAlias      = resolveSigning("keyAlias",      "UNLOOP_KEY_ALIAS")
def signingKeyPassword   = resolveSigning("keyPassword",   "UNLOOP_KEY_PASSWORD")

def hasReleaseSigning = signingStoreFile && signingStorePassword && signingKeyAlias && signingKeyPassword

android {
    namespace = "app.unloop"
    compileSdk = rootProject.ext.compileSdkVersion
	buildFeatures {
    	buildConfig = true
	}
    defaultConfig {
        applicationId "app.unloop"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                def resolvedStore = file(signingStoreFile)
                if (!resolvedStore.isAbsolute()) {
                    resolvedStore = rootProject.file(signingStoreFile)
                }
                storeFile     resolvedStore
                storePassword signingStorePassword
                keyAlias      signingKeyAlias
                keyPassword   signingKeyPassword
                enableV1Signing true
                enableV2Signing true
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            } else {
                logger.warn("Release signing not configured — set android/keystore.properties or UNLOOP_KEYSTORE_* env vars. bundleRelease will produce an UNSIGNED AAB.")
            }
        }
    }
    kotlinOptions {
        jvmTarget = "21"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase Crashlytics (BoM pins versions). FCM/Analytics intentionally
    // not included — only crash reporting is required for launch.
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-crashlytics-ndk'

    // WorkManager — drives reminder scheduling. Persisted across reboots
    // by WorkManager's internal database; BootCompletedReceiver re-arms
    // any schedule the user had configured before the reboot.
    implementation 'androidx.work:work-runtime-ktx:2.9.1'
    implementation 'androidx.core:core-ktx:1.13.1'
}

apply from: 'capacitor.build.gradle'

// Firebase / Crashlytics plugins are only applied when google-services.json
// is present. This keeps debug builds — and CI without secrets — buildable.
try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
        apply plugin: 'com.google.firebase.crashlytics'
    }
} catch(Exception e) {
    logger.info("google-services.json not found — google-services & crashlytics gradle plugins not applied. Crash reports won't upload until you drop google-services.json into android/app/.")
}

